<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>새 교육감에게 바란다 — 포춘 쿠키</title>
<meta name="description" content="장애인주간 기념 이벤트 — 포춘 쿠키를 깨고, 새 교육감에게 바라는 한마디를 전해 보세요.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1410;
  --bg2: #231c14;
  --card: #2a2018;
  --accent: #d4a753;
  --accent-dim: #a07d3a;
  --text: #f5efe6;
  --text-dim: #b8a890;
  --paper: #faf3e0;
  --paper-text: #3d2e1a;
  --crack: #8b6914;
}

html, body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1em;
}

#bg-image {
  position: fixed;
  inset: 0;
  background: url('bg.png') center/cover no-repeat;
  opacity: 0.12;
  z-index: 0;
  pointer-events: none;
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 520px;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.screen { display: none; flex-direction: column; align-items: center; width: 100%; }
.screen.active { display: flex; }

#mute-btn {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 100;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--accent-dim);
  background: rgba(26, 20, 16, 0.85);
  color: var(--text);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  touch-action: manipulation;
  transition: background 0.2s;
}
#mute-btn:hover, #mute-btn:focus {
  background: rgba(212, 167, 83, 0.2);
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

#sr-announce {
  position: absolute;
  width: 1px; height: 1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  white-space: nowrap;
}

/* ===== SCREEN 1: START ===== */
#start-screen { text-align: center; animation: fadeIn 0.8s ease; gap: 1.2em; }

.org-name {
  font-size: 0.8rem;
  color: var(--text-dim);
  letter-spacing: 2px;
}

.main-title {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--accent);
  line-height: 1.3;
}

.main-subtitle {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 1.1rem;
  color: var(--text-dim);
  line-height: 1.5;
}

.event-period {
  display: inline-block;
  border: 1px solid var(--accent-dim);
  padding: 0.3em 1em;
  border-radius: 4px;
  font-size: 0.85rem;
  color: var(--accent);
  letter-spacing: 1px;
}

.desc {
  font-size: 0.9rem;
  color: var(--text-dim);
  line-height: 1.7;
  max-width: 400px;
  margin: 0 auto;
}

.primary-btn {
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  padding: 0.7em 2em;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  touch-action: manipulation;
  min-height: 52px;
}
.primary-btn:hover, .primary-btn:focus {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(212, 167, 83, 0.3);
  outline: 2px solid var(--text);
  outline-offset: 3px;
}

.gift-note {
  font-size: 0.8rem;
  color: var(--text-dim);
}

/* ===== SCREEN 2: COOKIE SELECT + CRACK ===== */
#cookie-screen { animation: fadeIn 0.5s ease; gap: 1em; }

.cookie-prompt {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 1.2rem;
  color: var(--text);
  text-align: center;
}

.cookie-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 16px;
  padding: 1em 0;
}

.cookie-btn {
  width: 90px;
  height: 90px;
  border: 2px solid transparent;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(212, 167, 83, 0.12) 0%, transparent 70%);
  cursor: pointer;
  transition: transform 0.3s ease, border-color 0.3s, box-shadow 0.3s;
  touch-action: manipulation;
  padding: 12px;
  position: relative;
  animation: cookieFloat 3s ease-in-out infinite;
  overflow: hidden;
}
.cookie-btn:nth-child(2) { animation-delay: 0.4s; }
.cookie-btn:nth-child(3) { animation-delay: 0.8s; }
.cookie-btn:nth-child(4) { animation-delay: 1.2s; }
.cookie-btn:nth-child(5) { animation-delay: 1.6s; }
.cookie-btn:nth-child(6) { animation-delay: 2.0s; }
.cookie-btn:nth-child(7) { animation-delay: 2.4s; }

.cookie-btn img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
  mix-blend-mode: multiply;
}

.cookie-btn:hover, .cookie-btn:focus {
  border-color: var(--accent);
  transform: scale(1.1);
  box-shadow: 0 0 20px rgba(212, 167, 83, 0.25);
  outline: none;
}

.cookie-btn.fading {
  opacity: 0;
  transform: scale(0.5);
  transition: opacity 0.5s ease, transform 0.5s ease;
  pointer-events: none;
}

/* Selected cookie — center stage */
.cookie-center {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 1em;
}
.cookie-center.active { display: flex; }

.cookie-hero {
  width: 150px;
  height: 150px;
  animation: cookiePulse 1.5s ease-in-out infinite;
  cursor: pointer;
  touch-action: manipulation;
  border: none;
  background: transparent;
  padding: 0;
}
.cookie-hero img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  mix-blend-mode: multiply;
}

.crack-prompt {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 1rem;
  color: var(--accent);
  animation: fadeIn 0.5s ease;
}

/* Cracked state */
.cookie-cracked {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 1em;
  width: 100%;
}
.cookie-cracked.active { display: flex; }

.crack-halves {
  display: flex;
  justify-content: center;
  gap: 0;
  height: 80px;
  overflow: hidden;
}
.crack-half {
  width: 75px;
  height: 80px;
  overflow: hidden;
  transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
}
.crack-half img {
  width: 150px;
  height: 80px;
  object-fit: contain;
  mix-blend-mode: multiply;
}
.crack-half.left img { object-position: right; }
.crack-half.right img { object-position: left; transform: scaleX(-1); }
.crack-halves.split .crack-half.left { transform: translateX(-20px) rotate(-8deg); }
.crack-halves.split .crack-half.right { transform: translateX(20px) rotate(8deg); }

/* Fortune paper */
.fortune-paper {
  background: var(--paper);
  color: var(--paper-text);
  border-radius: 4px;
  padding: 1.5em;
  max-width: 440px;
  width: 100%;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  font-family: 'Nanum Myeongjo', serif;
  font-size: 1.05rem;
  line-height: 1.8;
  text-align: center;
  position: relative;
  transform: scaleY(0);
  transform-origin: top;
  transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
  word-break: keep-all;
}
.fortune-paper.unfolded { transform: scaleY(1); }

.fortune-paper::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 10%;
  right: 10%;
  height: 1px;
  background: rgba(61, 46, 26, 0.1);
}

.fortune-text {
  min-height: 3em;
}

.paper-actions {
  display: flex;
  gap: 0.8em;
  margin-top: 1em;
  justify-content: center;
  flex-wrap: wrap;
}

.secondary-btn {
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  padding: 0.6em 1.5em;
  border: 1px solid var(--accent-dim);
  background: transparent;
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  touch-action: manipulation;
  min-height: 48px;
}
.secondary-btn:hover, .secondary-btn:focus {
  border-color: var(--accent);
  background: rgba(212, 167, 83, 0.1);
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* ===== SCREEN 3: COMPLETE ===== */
#complete-screen { animation: fadeIn 0.5s ease; gap: 1em; }

.result-fortune {
  background: var(--paper);
  color: var(--paper-text);
  border-radius: 4px;
  padding: 1.5em;
  max-width: 460px;
  width: 100%;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  font-family: 'Nanum Myeongjo', serif;
  font-size: 1rem;
  line-height: 1.8;
  text-align: center;
  word-break: keep-all;
}

.form-area {
  width: 100%;
  max-width: 460px;
  display: flex;
  flex-direction: column;
  gap: 0.8em;
}

.form-area label {
  font-size: 0.85rem;
  color: var(--text-dim);
  font-weight: 700;
}

.form-area textarea {
  width: 100%;
  padding: 0.7em;
  border: 1px solid #4a3a28;
  border-radius: 6px;
  background: rgba(0,0,0,0.3);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.95rem;
  min-height: 80px;
  resize: vertical;
  transition: border-color 0.2s;
}
.form-area textarea:focus {
  border-color: var(--accent);
  outline: 2px solid var(--accent);
  outline-offset: 1px;
}

.form-area .optional-tag {
  font-size: 0.75rem;
  color: var(--text-dim);
  font-weight: 400;
}

.action-btns {
  display: flex;
  flex-direction: column;
  gap: 0.6em;
  width: 100%;
  max-width: 460px;
}

.blog-link {
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  padding: 0.6em 1.5em;
  background: rgba(212, 167, 83, 0.15);
  color: var(--accent);
  border: 1px solid var(--accent-dim);
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.2s;
  touch-action: manipulation;
  min-height: 48px;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.blog-link:hover, .blog-link:focus {
  background: rgba(212, 167, 83, 0.25);
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--accent);
  color: var(--bg);
  padding: 0.6em 1.5em;
  border-radius: 6px;
  font-weight: 700;
  font-size: 0.9rem;
  z-index: 200;
  transition: transform 0.3s ease;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes cookieFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
@keyframes cookiePulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

@media (max-width: 600px) {
  body { padding: 0.5em; }
  .main-title { font-size: 1.8rem; }
  .cookie-btn { width: 72px; height: 72px; }
  .cookie-hero { width: 120px; height: 120px; }
  .cookie-grid { gap: 10px; }
  .fortune-paper { font-size: 0.95rem; padding: 1em; }
}
</style>
</head>
<body>

<div id="bg-image"></div>
<button id="mute-btn" aria-label="효과음 끄기">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.08"/>
  </svg>
</button>
<div id="sr-announce" role="status" aria-live="assertive" aria-atomic="true"></div>

<div class="container">

  <!-- SCREEN 1: START -->
  <div id="start-screen" class="screen active">
    <div class="org-name">함께하는장애인교원노동조합</div>
    <h1 class="main-title">새 교육감에게<br>바란다</h1>
    <p class="main-subtitle">포춘 쿠키를 깨고,<br>당신의 목소리를 담아보세요.</p>
    <div class="event-period">장애인주간 2026. 4. 20. ~ 4. 24.</div>
    <p class="desc">
      포춘 쿠키 안에는 장애인 교원의 바람이 담겨 있습니다.<br>
      쿠키를 깨고 나온 메시지에 당신의 한마디를 더해<br>
      새 교육감에게 전해 주세요.
    </p>
    <button class="primary-btn" id="start-btn">쿠키 뽑으러 가기</button>
    <p class="gift-note">참여자 전원 기프티콘(5천 원) 증정</p>
  </div>

  <!-- SCREEN 2: COOKIE -->
  <div id="cookie-screen" class="screen">
    <!-- Phase 1: Cookie grid -->
    <div id="cookie-select-phase">
      <p class="cookie-prompt">하나를 골라 주세요</p>
      <div class="cookie-grid" id="cookie-grid" role="group" aria-label="포춘 쿠키 7개 중 하나를 선택하세요">
        <!-- 7 cookies generated by JS -->
      </div>
    </div>

    <!-- Phase 2: Selected cookie center -->
    <div class="cookie-center" id="cookie-center-phase">
      <button class="cookie-hero" id="cookie-hero" aria-label="쿠키를 깨려면 클릭하세요">
        <img src="cookie.png" alt="">
      </button>
      <p class="crack-prompt">클릭하여 쿠키를 깨세요</p>
    </div>

    <!-- Phase 3: Cracked cookie + fortune paper -->
    <div class="cookie-cracked" id="cookie-cracked-phase">
      <div class="crack-halves" id="crack-halves">
        <div class="crack-half left"><img src="cookie.png" alt=""></div>
        <div class="crack-half right"><img src="cookie.png" alt=""></div>
      </div>
      <div class="fortune-paper" id="fortune-paper">
        <div class="fortune-text" id="fortune-text"></div>
      </div>
      <div class="paper-actions" id="paper-actions" style="display:none">
        <button class="primary-btn" id="accept-btn">이 메시지로 참여하기</button>
        <button class="secondary-btn" id="retry-btn">다시 뽑기</button>
      </div>
    </div>
  </div>

  <!-- SCREEN 3: COMPLETE -->
  <div id="complete-screen" class="screen">
    <div class="result-fortune" id="result-fortune"></div>
    <div class="form-area">
      <div>
        <label for="extra-message">한마디를 더 추가하고 싶다면 <span class="optional-tag">(선택)</span></label>
        <textarea id="extra-message" placeholder="포춘 메시지만으로도 충분합니다. 추가로 하고 싶은 말이 있다면 적어 주세요." maxlength="300"></textarea>
      </div>
    </div>
    <div class="action-btns">
      <button class="primary-btn" id="submit-btn">나의 한마디 완성하기</button>
      <a class="blog-link" id="form-link" href="#" target="_blank" rel="noopener noreferrer">Google Form으로 제출하기</a>
      <button class="secondary-btn" id="restart-btn">다시 하기</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="fortune_data.js"></script>
<script src="sfx_data.js"></script>
<script>
// ===== STATE =====
const State = {
  currentScreen: 'start',
  fortuneIndex: -1,
  extraMessage: '',
  isMuted: false,
  phase: 'select' // select | center | cracked
};

// Google Form URL — PLACEHOLDER, 실제 Form 생성 후 교체
const GOOGLE_FORM_URL = 'https://forms.google.com/placeholder';

// ===== AUDIO =====
const AudioMgr = {
  ctx: null, masterGain: null, initialized: false, sfxCache: {},

  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.connect(this.ctx.destination);
      this.masterGain.gain.value = 0.3;
      this.initialized = true;
    } catch (e) {}
  },

  setMuted(muted) {
    State.isMuted = muted;
    if (this.masterGain) this.masterGain.gain.value = muted ? 0 : 0.3;
  },

  async play(key) {
    if (!this.initialized || State.isMuted) return;
    if (typeof SFX_DATA === 'undefined' || !SFX_DATA[key]) return;
    try {
      if (!this.sfxCache[key]) {
        const resp = await fetch(SFX_DATA[key]);
        const buf = await resp.arrayBuffer();
        this.sfxCache[key] = await this.ctx.decodeAudioData(buf);
      }
      const src = this.ctx.createBufferSource();
      src.buffer = this.sfxCache[key];
      src.connect(this.masterGain);
      src.start();
    } catch {}
  }
};

// ===== HELPERS =====
function announce(text) {
  const el = document.getElementById('sr-announce');
  el.textContent = '';
  requestAnimationFrame(() => { el.textContent = text; });
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + '-screen').classList.add('active');
  State.currentScreen = name;
  requestAnimationFrame(() => {
    const target = document.querySelector('#' + name + '-screen button, #' + name + '-screen textarea');
    if (target) target.focus();
  });
}

// ===== COOKIE GRID =====
const COOKIE_COUNT = 7;

function buildCookieGrid() {
  const grid = document.getElementById('cookie-grid');
  grid.innerHTML = '';
  for (let i = 0; i < COOKIE_COUNT; i++) {
    const btn = document.createElement('button');
    btn.className = 'cookie-btn';
    btn.setAttribute('aria-label', (i + 1) + '번 쿠키');
    btn.innerHTML = '<img src="cookie.png" alt="">';
    btn.addEventListener('click', () => selectCookie(i, btn));
    grid.appendChild(btn);
  }
}

function selectCookie(index, btn) {
  AudioMgr.init();
  AudioMgr.play('button_click');

  // Pick random fortune
  State.fortuneIndex = Math.floor(Math.random() * FORTUNES.length);

  // Fade out other cookies
  const allBtns = document.querySelectorAll('.cookie-btn');
  allBtns.forEach((b, i) => {
    if (i !== index) b.classList.add('fading');
  });
  btn.style.pointerEvents = 'none';

  announce((index + 1) + '번 쿠키를 선택했습니다. 잠시 후 쿠키를 깰 수 있습니다.');

  // After fade, show center phase
  setTimeout(() => {
    document.getElementById('cookie-select-phase').style.display = 'none';
    document.getElementById('cookie-center-phase').classList.add('active');
    AudioMgr.play('ambient_shimmer');
    State.phase = 'center';
    announce('쿠키를 깨려면 클릭하거나 Enter를 누르세요.');
  }, 700);
}

function crackCookie() {
  if (State.phase !== 'center') return;
  State.phase = 'cracked';

  AudioMgr.play('cookie_crack');
  vibrate([100, 50, 100]);

  // Hide center, show cracked
  document.getElementById('cookie-center-phase').classList.remove('active');
  document.getElementById('cookie-cracked-phase').classList.add('active');

  // Split animation
  setTimeout(() => {
    document.getElementById('crack-halves').classList.add('split');
  }, 50);

  // Unfold paper
  setTimeout(() => {
    AudioMgr.play('paper_unfold');
    const paper = document.getElementById('fortune-paper');
    paper.classList.add('unfolded');
  }, 800);

  // Typewriter text
  setTimeout(() => {
    const text = FORTUNES[State.fortuneIndex];
    typeWriter(document.getElementById('fortune-text'), text, 40, () => {
      AudioMgr.play('reveal_chime');
      document.getElementById('paper-actions').style.display = 'flex';
      announce('메시지: ' + text);
    });
  }, 1400);
}

function typeWriter(el, text, speed, callback) {
  el.textContent = '';
  let i = 0;
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReduced) {
    el.textContent = text;
    if (callback) callback();
    return;
  }
  function type() {
    if (i < text.length) {
      el.textContent += text.charAt(i);
      i++;
      setTimeout(type, speed);
    } else {
      if (callback) callback();
    }
  }
  type();
}

function resetCookieScreen() {
  // Reset all phases
  document.getElementById('cookie-select-phase').style.display = '';
  document.getElementById('cookie-center-phase').classList.remove('active');
  document.getElementById('cookie-cracked-phase').classList.remove('active');
  document.getElementById('crack-halves').classList.remove('split');
  document.getElementById('fortune-paper').classList.remove('unfolded');
  document.getElementById('fortune-text').textContent = '';
  document.getElementById('paper-actions').style.display = 'none';
  State.phase = 'select';

  // Rebuild grid (resets fading)
  buildCookieGrid();
}

// ===== COMPLETE SCREEN =====
function goToComplete() {
  AudioMgr.play('button_click');
  document.getElementById('result-fortune').textContent = FORTUNES[State.fortuneIndex];
  showScreen('complete');
  announce('메시지가 선택되었습니다. 한마디를 추가하거나 바로 완성할 수 있습니다.');
}

function formatResultText() {
  let text = '[새 교육감에게 바란다]\n\n';
  text += '"' + FORTUNES[State.fortuneIndex] + '"';
  const extra = document.getElementById('extra-message').value.trim();
  if (extra) {
    text += '\n\n나의 한마디: ' + extra;
  }
  text += '\n\n#새교육감에게바란다 #장애인주간 #장교조';
  return text;
}

async function submitResult() {
  const text = formatResultText();
  // Copy to clipboard
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  AudioMgr.play('copy_success');
  showToast('클립보드에 복사되었습니다');
  announce('결과가 클립보드에 복사되었습니다.');

  // Update form link with pre-fill
  const formUrl = buildFormUrl();
  document.getElementById('form-link').href = formUrl;
}

function buildFormUrl() {
  // Google Form pre-fill URL
  // entry IDs will be set after Form creation
  const fortune = FORTUNES[State.fortuneIndex];
  const extra = document.getElementById('extra-message').value.trim();

  return GOOGLE_FORM_URL;
}

// ===== INIT =====
function init() {
  buildCookieGrid();

  // Start button
  document.getElementById('start-btn').addEventListener('click', () => {
    AudioMgr.init();
    AudioMgr.play('button_click');
    showScreen('cookie');
    announce('포춘 쿠키 7개가 있습니다. 하나를 골라 주세요.');
  });

  // Crack cookie
  document.getElementById('cookie-hero').addEventListener('click', crackCookie);

  // Accept fortune
  document.getElementById('accept-btn').addEventListener('click', goToComplete);

  // Retry (from cookie screen)
  document.getElementById('retry-btn').addEventListener('click', () => {
    AudioMgr.play('button_click');
    resetCookieScreen();
    announce('다시 뽑기. 쿠키 7개 중 하나를 골라 주세요.');
  });

  // Submit
  document.getElementById('submit-btn').addEventListener('click', submitResult);

  // Restart (from complete screen)
  document.getElementById('restart-btn').addEventListener('click', () => {
    AudioMgr.play('button_click');
    document.getElementById('extra-message').value = '';
    resetCookieScreen();
    showScreen('cookie');
    announce('처음부터 다시 시작합니다. 쿠키를 골라 주세요.');
  });

  // Mute
  document.getElementById('mute-btn').addEventListener('click', () => {
    const btn = document.getElementById('mute-btn');
    if (State.isMuted) {
      AudioMgr.setMuted(false);
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.08"/></svg>';
      btn.setAttribute('aria-label', '효과음 끄기');
    } else {
      AudioMgr.setMuted(true);
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
      btn.setAttribute('aria-label', '효과음 켜기');
    }
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.target.closest('textarea, input, select')) return;

    if (e.key === 'Escape') {
      if (State.currentScreen === 'cookie') {
        if (State.phase === 'cracked' || State.phase === 'center') {
          resetCookieScreen();
          announce('쿠키 선택으로 돌아갑니다.');
        } else {
          showScreen('start');
        }
      } else if (State.currentScreen === 'complete') {
        resetCookieScreen();
        showScreen('cookie');
        announce('쿠키 선택으로 돌아갑니다.');
      }
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
